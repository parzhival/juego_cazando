<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juego Cazando - Edición Multiplataforma</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="cazando.css"/>
  <script src="utils.js"></script>
</head>
<body onload="iniciarJuego();">
   
  <h1>Juego Cazando</h1>
  <p class="autor">Autor: PARZHIVAL</p>
  
  <div class="contenedor-juego">
    <canvas id="areaJuego" width="500" height="500"></canvas>
  </div>

  <div class="interfaz-controles">
    <div class="controles">
      <div class="fila">
        <button onclick="moverArriba();">⬆</button>
      </div>
      <div class="fila">
        <button onclick="moverIzquierda();">⬅</button>
        <button onclick="moverAbajo();">⬇</button>
        <button onclick="moverDerecha();">➡</button>
      </div>
    </div>

    <div class="seccion-reinicio">
      <button onclick="reiniciarJuego();">REINICIAR</button>
    </div>
  </div>

  <div class="panel">
    <span>Puntos: <span id="puntos">0</span></span>
    <span>Tiempo: <span id="tiempo">10</span></span>
  </div>

  <p id="mensaje"></p>

  <script src="cazando.js"></script>
</body>
</html>
